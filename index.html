<!DOCTYPE html>
<html lang="pt-BR">

<head>
     <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <meta name="description" content="Trilha de aprendizado JavaScript interativa com checklist e progresso." />
     <title>JS Roadmap</title>
     <link rel="stylesheet" href="style.css">
     <script src="https://cdn.tailwindcss.com"></script>
     <link rel="preconnect" href="https://fonts.googleapis.com" />
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
     <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap"
          rel="stylesheet" />

</head>

<body class="min-h-screen text-white">

     <div class="max-w-2xl mx-auto px-4 py-12 flex flex-col gap-10">

          <!-- Header -->
          <header class="flex flex-col gap-6">

               <div class="flex items-start justify-between">
                    <div>
                         <p class="text-xs font-mono text-zinc-500 uppercase tracking-widest mb-1">Learning Path</p>
                         <h1 id="roadmap-title" class="text-3xl font-bold tracking-tight text-white"></h1>
                    </div>
                    <button onclick="resetProgress()"
                         class="text-xs font-mono text-zinc-600 hover:text-red-400 transition-colors mt-1 cursor-pointer"
                         title="Resetar progresso">
                         reset
                    </button>
               </div>

               <!-- Stats -->
               <div class="flex items-center gap-6">
                    <div class="flex flex-col">
                         <span class="text-xs text-zinc-500 font-mono">completed</span>
                         <span class="text-2xl font-bold text-white font-mono tabular-nums">
                              <span id="stat-completed">0</span><span class="text-zinc-600 text-lg">/<span
                                        id="stat-total">0</span></span>
                         </span>
                    </div>
                    <div class="flex flex-col">
                         <span class="text-xs text-zinc-500 font-mono">progress</span>
                         <span id="stat-percent"
                              class="text-2xl font-bold text-yellow-400 font-mono tabular-nums">0%</span>
                    </div>
               </div>

               <!-- Global progress bar -->
               <div class="w-full bg-zinc-800 rounded-full h-2 overflow-hidden" role="progressbar"
                    aria-label="Progresso total" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                    <div id="progress-bar" class="h-full rounded-full bg-yellow-400 transition-all duration-700"
                         style="width: 0%"></div>
               </div>

          </header>

          <!-- Modules -->
          <main id="modules" class="flex flex-col gap-4"></main>

          <!-- Footer -->
          <footer class="text-center pt-2">
               <p class="text-xs font-mono text-zinc-700">
                    ● <span class="text-zinc-500">easy</span>
                    &nbsp;●● <span class="text-zinc-500">medium</span>
                    &nbsp;●●● <span class="text-zinc-500">hard</span>
               </p>
               <p>
                    <a href="https://github.com/liberstack/roadmap">
                         github.com/liberstack/roadmap<br>PROJETOS + DOCUMENTAÇÃO README + DEPLOY
                    </a>
               </p>
          </footer>

     </div>

     <script src="app.js"></script>
</body>

</html>
